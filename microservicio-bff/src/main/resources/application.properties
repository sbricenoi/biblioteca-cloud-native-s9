# ─── Servidor ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=microservicio-bff

# ─── URLs de las funciones serverless ─────────────────────────────────────────
serverless.usuarios.url=${USUARIOS_SERVICE_URL:http://localhost:8081}
serverless.prestamos.url=${PRESTAMOS_SERVICE_URL:http://localhost:8082}

# ─── GraphQL ───────────────────────────────────────────────────────────────────
# Habilita la interfaz web GraphiQL en /graphiql
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.biblioteca=INFO
logging.level.org.springframework.graphql=DEBUG
